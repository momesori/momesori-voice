<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A0A14"/>
    </linearGradient>

    <!-- 코어 글로우 -->
    <radialGradient id="coreGlow" cx="50%" cy="52%" r="38%">
      <stop offset="0%" stop-color="#FF2D55" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FF2D55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF2D55" stop-opacity="0"/>
    </radialGradient>

    <!-- 민트 글로우 -->
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>

    <!-- 파형 그라디언트 -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2D55" stop-opacity="0"/>
      <stop offset="25%" stop-color="#FF2D55" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF6B9D" stop-opacity="1"/>
      <stop offset="75%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#FF2D55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF2D55" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="50%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <!-- 필터: 글로우 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 아이콘 모서리 클립 -->
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- 배경 글로우들 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#mintGlow)"/>
  <ellipse cx="256" cy="270" rx="180" ry="160" fill="url(#coreGlow)"/>

  <!-- 배경 그리드 (미래적) -->
  <g clip-path="url(#iconClip)" opacity="0.06">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00E5FF" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00E5FF" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00E5FF" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00E5FF" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00E5FF" stroke-width="1"/>
  </g>

  <!-- ── 사운드 파형 레이어 ── -->
  <!-- 파형 1 (메인) -->
  <path d="M 56 256 Q 100 190 144 256 Q 188 322 232 256 Q 276 190 320 256 Q 364 322 408 256 Q 430 222 456 256"
    fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- 파형 2 (얇게) -->
  <path d="M 56 256 Q 100 210 144 256 Q 188 302 232 256 Q 276 210 320 256 Q 364 302 408 256 Q 430 232 456 256"
    fill="none" stroke="url(#waveGrad2)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- 파형 3 (아래) -->
  <path d="M 80 256 Q 120 300 160 256 Q 200 212 240 256 Q 280 300 320 256 Q 360 212 400 256 Q 420 235 440 256"
    fill="none" stroke="#FFB830" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- ── 중앙 코어 ── -->
  <!-- 바깥 링 (글로우) -->
  <circle cx="256" cy="256" r="68" fill="none"
    stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.3" filter="url(#bigGlow)"/>

  <!-- 중간 링 -->
  <circle cx="256" cy="256" r="52" fill="none"
    stroke="url(#ringGrad)" stroke-width="1" opacity="0.5"/>

  <!-- 코어 원 배경 -->
  <circle cx="256" cy="256" r="42"
    fill="#0D0D1A" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- 코어 내부 글로우 -->
  <circle cx="256" cy="256" r="36"
    fill="#FF2D55" fill-opacity="0.12"/>

  <!-- ── M 레터마크 ── -->
  <!-- M자 — Momesori 이니셜 -->
  <g filter="url(#softGlow)">
    <path d="M 220 280 L 220 232 L 256 265 L 292 232 L 292 280"
      fill="none" stroke="url(#ringGrad)" stroke-width="6"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 코어 중심 점 -->
  <circle cx="256" cy="256" r="5" fill="#FF2D55" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="3" fill="#FF6B9D"/>

  <!-- ── 파형 수직 바 (코어 좌우) ── -->
  <!-- 왼쪽 바들 -->
  <g filter="url(#softGlow)">
    <rect x="152" y="238" width="5" height="36" rx="2.5" fill="#FF2D55" opacity="0.8"/>
    <rect x="166" y="228" width="5" height="56" rx="2.5" fill="#FF2D55" opacity="0.6"/>
    <rect x="180" y="244" width="5" height="24" rx="2.5" fill="#FF6B9D" opacity="0.5"/>

    <!-- 오른쪽 바들 -->
    <rect x="327" y="238" width="5" height="36" rx="2.5" fill="#00E5FF" opacity="0.8"/>
    <rect x="341" y="228" width="5" height="56" rx="2.5" fill="#00E5FF" opacity="0.6"/>
    <rect x="355" y="244" width="5" height="24" rx="2.5" fill="#00FFB2" opacity="0.5"/>
  </g>

  <!-- ── 하단 텍스트 ── -->
  <text x="256" y="358" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="800" letter-spacing="6"
    fill="#FFFFFF" opacity="0.95">
    MOME
  </text>
  <text x="256" y="390" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="300" letter-spacing="12"
    fill="#FF2D55" opacity="0.9">
    SORI
  </text>

  <!-- ── 상단 작은 태그 ── -->
  <text x="256" y="136" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13" font-weight="400" letter-spacing="4"
    fill="#00E5FF" opacity="0.5">
    VOICE
  </text>

  <!-- 테두리 링 (전체) -->
  <rect width="512" height="512" rx="112" ry="112"
    fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.15"/>
</svg>
